<!doctype html>
<html>
<head>
    <title>ENGO551 Charu's Lab 5 GeoWeb App!</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>

    <!-- My CSS -->
    <link rel="stylesheet" href="static/styles.css">
</head>

<body>

    <!-- Sidebar of screen -->
    <div class="sidebar">
        <h2>Charu's Lab 5 IoT GeoWeb App</h2>

        <label>MQTT Host</label>
        <input type="text" id="host" value="test.mosquitto.org">

        <label>Port</label>
        <input type="text" id="port" value="8081">

        <label>Publish Topic</label>
        <input type="text" id="topic">

        <button id="startButton">Start Connection</button>
        <button id="endButton">End Connection</button>

        <p id="status">Status: Not Connected</p>
        <p id="messages">Waiting for recieved messages...</p>

        <label>Message</label>
        <input type="text" id="messageText">
        <button id="publishButton">Publish Message</button>

    </div>

    <div id="map"></div>

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    
    <!-- Paho-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>

    <script>
        // Calgary coordinates
        var map = L.map('map').setView([51.05, -114.07], 10);

        // Tile layer
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // MQTT Logic: 

        // variables from screen
        var hostInput = document.getElementById("host");
        var portInput = document.getElementById("port");
        var topicInput = document.getElementById("topic");
        var messageInput = document.getElementById("messageText");
        var startButton = document.getElementById("startButton");
        var endButton = document.getElementById("endButton");
        var publishButton = document.getElementById("publishButton");
        var statusText = document.getElementById("status");
        var messagesText = document.getElementById("messages");

        // Variables and logic adapted from Steves Example Code: http://www.steves-internet-guide.com/mosquitto-broker/
        var mqtt = null;
        var connectedFlag = 0;
        var reconnectTimeout = 2000;


        // connect is lost 
        function onConnectionLost() {
            console.log("Connection lost");
            connectedFlag = 0;
            statusText.innerHTML = "Status: Connection Lost";
            
            // unlock inputs
            hostInput.disabled = false;
            portInput.disabled = false;
        }

        // message arrived
        function onMessageArrived(message) {
            console.log("Message received: " + message.payloadString);
            console.log("Topic: " + message.destinationName);
            messagesText.innerHTML = "Message received:" + message.destinationName + ":" + message.payloadString;
        }

        // connection made
        function onConnect() {
            console.log("Connected");
            connectedFlag = 1;
            statusText.innerHTML = "Status: Connected";

            // lock inputs
            hostInput.disabled = true;
            portInput.disabled = true;

            // topic input logic and sub to topic
            var topic = topicInput.value;
            if (topic !== "") {
                mqtt.subscribe(topic);
                console.log("Subscribed to " + topic);
                messagesText.innerHTML = "Subscribed to: " + topic;
            }
        }

        // connection failed
        function onFailure(message) {
            console.log("Connection failed");
            statusText.innerHTML = "Status: Connection Failed";

            // unlock inputs
            hostInput.disabled = false;
            portInput.disabled = false;
        }

        // setting up MQTT with variable and connection
        function setupMQTTClient() {
            // save variable values
            var host = hostInput.value;
            var port = parseInt(portInput.value);
            var mqttName = "mqtt-" + Math.floor(Math.random() * 10000);

            // create paho connection 
            mqtt = new Paho.MQTT.Client(host, port, mqttName);

            mqtt.onConnectionLost = onConnectionLost;
            mqtt.onMessageArrived = onMessageArrived;

            console.log("MQTT mqtt created for " + host + ":" + port);

            mqtt.connect({
                timeout: 3,
                onSuccess: onConnect,
                onFailure: onFailure,
                useSSL: true
            });
        }

        // diconnect connection 
        function disconnectMQTT() {
            if (connectedFlag === 1 && mqtt !== null) {
                mqtt.disconnect();
                connectedFlag = 0;
                console.log("Disconnected");
                statusText.innerHTML = "Status: Disconnected";

                // unlock the inputs
                hostInput.disabled = false;
                portInput.disabled = false;
            }
        }

        // publish the message from user
        function publishMessage() {
            // can't publish if
            if (connectedFlag !== 1 || mqtt === null) {
                messagesText.innerHTML = "Not connected, cannot publish.";
                return;
            }

            var topic = topicInput.value;
            var messageText = messageInput.value;

            // check if user forgot remind them
            if (topic === "") {
                messagesText.innerHTML = "Please enter a topic.";
                return;
            }
            if (messageText === "") {
                messagesText.innerHTML = "Please enter a message.";
                return;
            }

            // message and publish to topic
            var message = new Paho.MQTT.Message(messageText);
            message.destinationName = topic;
            mqtt.send(message);
            console.log("Message published to " + topic);
            messagesText.innerHTML = "Published to " + topic + ": " + messageText;
        }

        // Button logic
        startButton.addEventListener("click", setupMQTTClient);
        endButton.addEventListener("click", disconnectMQTT);
        publishButton.addEventListener("click", publishMessage);
    </script>
</body>
</html>
