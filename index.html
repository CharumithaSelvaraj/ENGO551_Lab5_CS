<!doctype html>
<html>
<head>
  <title>{% block title %}ENGO551 Charu's Lab 4 Website{% endblock %}</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>

  <!-- Flatpickr Date Range Picker CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  <!-- Marker Cluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css">

  <!-- My CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

  <!-- Sidebar of screen for data query -->
  <div class="sidebar">
    <h2>Calgary Building Permits + 2017 Traffic Incidents </h2>
    <p>Search permits by issued date range.</p>

    <!-- Form for date range -->
    <form method="POST">
      <label for="date_range">Date Range</label>
      <input type="text" id="date_range" name="date_range" placeholder="Select date range">
      <button type="submit">Search</button>
    </form>

    <p>You can also toggle the 2017 Calgary Traffic Incidents heatmap on and off using the map control</p>
  </div>

  <div id="map"></div>
  

  <!-- Leaflet JavaScript -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <!-- Overlapping Marker Spiderfier (link from Github ReadMe)-->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/OverlappingMarkerSpiderfier-Leaflet/0.2.6/oms.min.js"></script>

  <!-- Marker Cluster (link from Github ReadMe) -->
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

  <!-- Flatpickr -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <script id="permits-data" type="application/json">
    {{ permits | tojson }}
  </script>

  <script>
    // Calgary Coords from wikipedia
    var map = L.map('map').setView([51.05, -114.07], 10);

    // Tile layer
    // L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    //     maxZoom: 19,
    //     attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    // }).addTo(map);

    // Flatpickr date range picker
    flatpickr("#date_range", {
        mode: "range",
        dateFormat: "Y-m-d"
    });

    // OMS layer
    var oms = new OverlappingMarkerSpiderfier(map);
    // marker clsuter group
    var markers = L.markerClusterGroup();

    // GeoJSON passed from Flask
    var permitsData = document.getElementById("permits-data").textContent;

    // LAB 4 CODE: 
    // mapbox token 
    var mapboxToken = "pk.eyJ1IjoiY2hhcnVzZWx2YXJhaiIsImEiOiJjbW1tNXR6NXIxMzQ2MnFvcHU5ZXZqYXNsIn0.1TW83GEOXRn-SV5FQrAqow";

    var osm_layer = L.tileLayer('https://api.mapbox.com/styles/v1/{id}/tiles/{z}/{x}/{y}?access_token={accessToken}',
      {
        id: 'mapbox/light-v11',
        tileSize: 512,
        zoomOffset: -1,
        accessToken: mapboxToken,
        // copied attribution from TA code
        attribution: '© <a href="https://apps.mapbox.com/feedback/">Mapbox</a> © <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
      }
    ).addTo(map);
    
    // mapbox layer
    var mapboxLayer = L.tileLayer(
      'https://api.mapbox.com/styles/v1/{id}/tiles/{z}/{x}/{y}?access_token={accessToken}',
      {
        id: 'charuselvaraj/cmmve6i7y00cf01sk09au4s8d', 
        tileSize: 512,
        zoomOffset: -1,
        accessToken: mapboxToken, 
        // copied attribution from TA code
        attribution: '© <a href="https://apps.mapbox.com/feedback/">Mapbox</a> © <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
      }
    );

    // toggle different maps
    var overlayMaps = {
      "2017 Traffic Incidents Heatmap": mapboxLayer
    };

    L.control.layers(null, overlayMaps).addTo(map);


    if (permitsData && permitsData !== "null") {
        var permits = JSON.parse(permitsData);

        // loop through GeoJSON features
        if (permits.features) {
            permits.features.forEach(function(feature) {

                // permit as marker on map
                if (feature.geometry && feature.geometry.type === "Point") {
                    var coords = feature.geometry.coordinates;
                    var marker = L.marker([coords[1], coords[0]]); // now marker is not added directly to map
                    markers.addLayer(marker); // marker is added to cluster

                    // grabbing data about permit
                    var data = feature.properties;

                    // pop up of data on marker
                    marker.bindPopup(
                        "Issued Date: " + data.issueddate + "<br>" +
                        "Work Class Group: " + data.workclassgroup + "<br>" +
                        "Contractor Name: " + data.contractorname + "<br>" +
                        "Community Name: " + data.communityname + "<br>" +
                        "Original Address: " + data.originaladdress
                    );

                    // OMS so no overlap
                    oms.addMarker(marker);
                    // add maker to map 
                    map.addLayer(markers);
                }
            });
        }
    }
</script>

</body>
</html>
