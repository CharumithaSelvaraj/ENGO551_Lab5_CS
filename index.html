<!doctype html>
<html>
<head>
    <title>ENGO551 Charu's Lab 5 GeoWeb App!</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>

    <!-- My CSS -->
    <link rel="stylesheet" href="static/styles.css">
</head>

<body>

    <!-- Sidebar of screen -->
    <div class="sidebar">
        <h3>Charu's Lab 5 IoT GeoWeb App</h3>

        <!-- 1. CONNECTION -->
        <h4>Connection</h4>

        <label>MQTT Host</label>
        <input type="text" id="host" value="test.mosquitto.org">

        <label>Port</label>
        <input type="text" id="port" value="8081">

        <label>Topic</label>
        <input type="text" id="topic" value="ENGO551/Charu/my_temperature">

        <button id="startButton">Start Connection</button>
        <button id="endButton">End Connection</button>

        <p id="status">Status: Not Connected</p>

        <hr>

        <!-- 2. TEXT MESSAGING -->
        <h4>Send Message</h4>

        <label>Message</label>
        <input type="text" id="messageText">

        <button id="publishButton">Publish Message</button>

        <hr>

        <!-- 3. LOCATION / GEOJSON -->
        <h4>Share Location</h4>

        <button id="shareButton">Share My Status</button>

        <hr>

        <!-- OUTPUT -->
        <p id="messages">Waiting for messages...</p>
    </div>

    <div id="map"></div>

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    
    <!-- Paho-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>

    <script>
        // Calgary coordinates
        var map = L.map('map').setView([51.05, -114.07], 10);

        // Tile layer
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // MQTT Logic: 

        // variables from screen
        var hostInput = document.getElementById("host");
        var portInput = document.getElementById("port");
        var topicInput = document.getElementById("topic");
        var messageInput = document.getElementById("messageText");
        var startButton = document.getElementById("startButton");
        var endButton = document.getElementById("endButton");
        var publishButton = document.getElementById("publishButton");
        var statusText = document.getElementById("status");
        var messagesText = document.getElementById("messages");
        var shareButton = document.getElementById("shareButton");
        var marker = null;

        // Variables and logic adapted from Steves Example Code: http://www.steves-internet-guide.com/mosquitto-broker/
        var mqtt = null;
        var connectedFlag = 0;
        var reconnectTimeout = 2000;

        // connect is lost 
        function onConnectionLost() {
            console.log("Connection lost");
            connectedFlag = 0;
            statusText.innerHTML = "Status: Connection Lost";
            
            // unlock inputs
            hostInput.disabled = false;
            portInput.disabled = false;

            setTimeout(setupMQTTClient, reconnectTimeout);
        }

        // message arrived
        function onMessageArrived(message) {
            console.log("Message received: " + message.payloadString);
            console.log("Topic: " + message.destinationName);

            // if it is the map topic, expect GeoJSON
            if (message.destinationName === "ENGO551/Charu/my_temperature") {
                var data;

                // parse JSON else print message
                try {
                    data = JSON.parse(message.payloadString);
                } catch (e) {
                    messagesText.innerHTML = "Expected GeoJSON on my_temperature topic.";
                    return;
                }

                var lon = data.geometry.coordinates[0];
                var lat = data.geometry.coordinates[1];
                var temp = data.properties.temperature;

                // temperature colour based on reqs
                var colour;
                if (temp >= -40 && temp < 10) {
                    colour = "blue";
                } else if (temp >= 10 && temp < 30) {
                    colour = "green";
                } else {
                    colour = "red";
                }

                // remove previous marker if it exists
                if (marker !== null) {
                    map.removeLayer(marker);
                }

                // create marker
                marker = L.circleMarker([lat, lon], {
                    radius: 10,
                    color: colour,
                    fillColor: colour,
                    fillOpacity: 0.8
                }).addTo(map);

                // popup 
                marker.bindPopup(
                    "Lat: " + lat.toFixed(3) +
                    "<br>Lon: " + lon.toFixed(3) +
                    "<br>Temp: " + temp + "°C"
                );

                messagesText.innerHTML = "Lat:  " + lat + "Lon: "+ lon + "click on icon to see tmp";
            } 
            
            // otherwise just show the normal message
            else {
                messagesText.innerHTML =
                    "Message received on " + message.destinationName + ": " + message.payloadString;
            }
        }

        // connection made
        function onConnect() {
            console.log("Connected");
            connectedFlag = 1;
            statusText.innerHTML = "Status: Connected";

            // lock inputs
            hostInput.disabled = true;
            portInput.disabled = true;

            // topic input logic and sub to topic
            var topic = topicInput.value;
            if (topic !== "") {
                mqtt.subscribe(topic);
                console.log("Subscribed to " + topic);
                messagesText.innerHTML = "Subscribed to: " + topic;
            }
        }

        // connection failed
        function onFailure(message) {
            console.log("Connection failed");
            statusText.innerHTML = "Status: Connection Failed";

            // unlock inputs
            hostInput.disabled = false;
            portInput.disabled = false;
        }

        // setting up MQTT with variable and connection
        function setupMQTTClient() {
            // save variable values
            var host = hostInput.value;
            var port = parseInt(portInput.value);
            var mqttName = "mqtt-" + Math.floor(Math.random() * 10000);

            // create paho connection 
            mqtt = new Paho.MQTT.Client(host, port, mqttName);

            mqtt.onConnectionLost = onConnectionLost;
            mqtt.onMessageArrived = onMessageArrived;

            console.log("MQTT mqtt created for " + host + ":" + port);

            mqtt.connect({
                timeout: 3,
                onSuccess: onConnect,
                onFailure: onFailure,
                useSSL: true
            });
        }

        // diconnect connection 
        function disconnectMQTT() {
            if (connectedFlag === 1 && mqtt !== null) {
                mqtt.disconnect();
                connectedFlag = 0;
                console.log("Disconnected");
                statusText.innerHTML = "Status: Disconnected";

                // unlock the inputs
                hostInput.disabled = false;
                portInput.disabled = false;
            }
        }

        // publish the message from user
        function publishMessage() {
            // can't publish if
            if (connectedFlag !== 1 || mqtt === null) {
                messagesText.innerHTML = "Not connected, cannot publish.";
                return;
            }

            var topic = topicInput.value;
            var messageText = messageInput.value;

            // check if user forgot remind them
            if (topic === "") {
                messagesText.innerHTML = "Please enter a topic.";
                return;
            }
            if (messageText === "") {
                messagesText.innerHTML = "Please enter a message.";
                return;
            }

            // message and publish to topic
            var message = new Paho.MQTT.Message(messageText);
            message.destinationName = topic;
            mqtt.send(message);
            console.log("Message published to " + topic);
            messagesText.innerHTML = "Published to " + topic + ": " + messageText;
        }

        function shareStatus() {
            // verify if user is connected first
            if (connectedFlag !== 1 || mqtt === null) {
                messagesText.innerHTML = "Not connected.";
                return;
            }

            // check if it will even work
            if (!navigator.geolocation) {
                messagesText.innerHTML = "Geolocation not working.";
                return;
            }

            navigator.geolocation.getCurrentPosition(function(position) {
                // get lat and lon
                var lat = position.coords.latitude;
                var lon = position.coords.longitude;

                // random temperature (between -40 to 60) 
                var temp = Math.floor(Math.random() * 101) - 40;

                //  GeoJSON object
                var geojson = {
                    type: "Feature",
                    geometry: {
                        type: "Point",
                        coordinates: [lon, lat]
                    },
                    properties: {
                        temperature: temp
                    }
                };

                var topic = topicInput.value;
                // double check topic isn't empty
                if (topic === "") {
                    messagesText.innerHTML = "Please enter a topic.";
                    return;
                }
                // create message and send message
                var message = new Paho.MQTT.Message(JSON.stringify(geojson));
                message.destinationName = topic;
                mqtt.send(message);
                console.log("GeoJSON sent:", geojson);
                messagesText.innerHTML = "Shared location (lat): " + lat + "(lon): "+ lon + " with temperature: " + temp;

            }, function() {
                messagesText.innerHTML = "Failed to get location.";
            });
        }

        // Button logic
        startButton.addEventListener("click", setupMQTTClient);
        endButton.addEventListener("click", disconnectMQTT);
        publishButton.addEventListener("click", publishMessage);
        shareButton.addEventListener("click", shareStatus);
    </script>
</body>
</html>
